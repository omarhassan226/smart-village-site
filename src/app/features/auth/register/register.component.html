<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__header">
      <h1 class="auth-card__title">{{ 'REGISTER_TITLE' | translate }}</h1>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-card__form" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">{{ 'FIRST_NAME' | translate }}</label>
          <input type="text" formControlName="first_name" class="form-control"
            [class.invalid]="f['first_name'].invalid && f['first_name'].touched" />
        </div>
        <div class="form-group">
          <label class="form-label">{{ 'LAST_NAME' | translate }}</label>
          <input type="text" formControlName="last_name" class="form-control"
            [class.invalid]="f['last_name'].invalid && f['last_name'].touched" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">{{ 'PHONE' | translate }}</label>
        <input type="tel" formControlName="phone" class="form-control" dir="ltr"
          [class.invalid]="f['phone'].invalid && f['phone'].touched" />
      </div>

      <div class="form-group">
        <label class="form-label">{{ 'EMAIL' | translate }}</label>
        <input type="email" formControlName="email" class="form-control" dir="ltr"
          [class.invalid]="f['email'].invalid && f['email'].touched" />
      </div>

      <div class="form-group">
        <label class="form-label">{{ 'PASSWORD' | translate }}</label>
        <input type="password" formControlName="password" class="form-control"
          [class.invalid]="f['password'].invalid && f['password'].touched" />
      </div>

      <div class="form-group">
        <label class="form-label">{{ 'CONFIRM_PASSWORD' | translate }}</label>
        <input type="password" formControlName="password_confirmation" class="form-control"
          [class.invalid]="form.hasError('mismatch') && f['password_confirmation'].touched" />
        <span class="form-error" *ngIf="form.hasError('mismatch') && f['password_confirmation'].touched">
          {{ 'CONFIRM_PASSWORD' | translate }} {{ 'ERROR' | translate }}
        </span>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" [disabled]="loading">
        {{ loading ? ('LOADING' | translate) : ('REGISTER_BTN' | translate) }}
      </button>
    </form>

    <div class="auth-card__footer">
      <span>{{ 'HAS_ACCOUNT' | translate }}</span>
      <a routerLink="/auth/login" class="auth-card__link">{{ 'LOGIN_BTN' | translate }}</a>
    </div>
  </div>
</div>
