<div class="modal" [class.open]="isOpen">
  <div class="modal-overlay" (click)="close.emit()"></div>
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title">{{ 'ADD_NEW_ADDRESS' | translate }}</h3>
      <button class="btn-close" (click)="close.emit()">
        <i class="uil uil-times"></i>
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">{{ 'RECEIVER_NAME' | translate }}</label>
          <input type="text" class="form-control" formControlName="receiver_name" />
        </div>
        <div class="form-group">
          <label class="form-label">{{ 'RECEIVER_PHONE' | translate }}</label>
          <input type="tel" class="form-control" formControlName="phone_number" dir="ltr" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">{{ 'GOVERNORATE' | translate }}</label>
          <select class="form-select" formControlName="governorate_id" (change)="onGovChange(+$any($event.target).value)">
            <option [value]="null">---</option>
            <option *ngFor="let g of governorates" [value]="g.id">{{ getName(g) }}</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">{{ 'CITY' | translate }}</label>
          <select class="form-select" formControlName="state_id" (change)="onCityChange(+$any($event.target).value)"
            [disabled]="!form.get('governorate_id')?.value">
            <option [value]="null">---</option>
            <option *ngFor="let c of cities" [value]="c.id">{{ getName(c) }}</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">{{ 'VILLAGE' | translate }}</label>
          <select class="form-select" formControlName="village_id" [disabled]="!form.get('state_id')?.value">
            <option [value]="null">---</option>
            <option *ngFor="let v of villages" [value]="v.id">{{ getName(v) }}</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">{{ 'ADDRESS_TYPE' | translate }}</label>
          <select class="form-select" formControlName="type_address">
            <option value="home">{{ 'HOME_ADDR' | translate }}</option>
            <option value="work">{{ 'WORK_ADDR' | translate }}</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">{{ 'ADDRESS_DETAILS' | translate }}</label>
        <textarea class="form-control" formControlName="address" rows="2"></textarea>
      </div>

      <div class="form-check">
        <input type="checkbox" id="is_default" formControlName="default" />
        <label for="is_default">{{ 'SET_AS_DEFAULT' | translate }}</label>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline" (click)="close.emit()">
          {{ 'CANCEL' | translate }}
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="form.invalid || saving">
          {{ (saving ? 'LOADING' : 'SAVE') | translate }}
        </button>
      </div>
    </form>
  </div>
</div>
