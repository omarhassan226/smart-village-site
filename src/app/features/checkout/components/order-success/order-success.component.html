<div class="success-page">
  <div class="success-card">
    <!-- Delivering SVG Animation Container -->
    <div class="illustration-container">
      <svg class="delivery-svg" viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="roadGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(var(--primary-rgb), 0)" />
            <stop offset="50%" stop-color="var(--primary)" />
            <stop offset="100%" stop-color="rgba(var(--primary-rgb), 0)" />
          </linearGradient>
          <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffb74d" />
            <stop offset="100%" stop-color="#f57c00" />
          </linearGradient>
        </defs>

        <!-- Background Circles -->
        <circle cx="250" cy="160" r="120" fill="rgba(var(--primary-rgb), 0.05)" />
        <circle cx="250" cy="160" r="80" fill="rgba(var(--primary-rgb), 0.08)" />

        <!-- Road -->
        <path d="M 50,240 Q 250,250 450,240" stroke="url(#roadGrad)" stroke-width="4" stroke-linecap="round"
          fill="none" />

        <!-- Delivery Guy on Scooter / Courier -->
        <g class="scooter-group">
          <!-- Back wheel -->
          <circle cx="190" cy="225" r="22" fill="#37474f" stroke="#cfd8dc" stroke-width="3" />
          <circle cx="190" cy="225" r="10" fill="#78909c" />

          <!-- Scooter Body -->
          <path d="M 180,225 L 260,225 Q 270,225 272,215 L 285,155 L 265,155 L 255,200 L 195,200 Z"
            fill="var(--primary)" />

          <!-- Front wheel -->
          <circle cx="295" cy="225" r="22" fill="#37474f" stroke="#cfd8dc" stroke-width="3" />
          <circle cx="295" cy="225" r="10" fill="#78909c" />

          <!-- Front Fork & Handlebar -->
          <path d="M 295,225 L 280,145 L 270,145" stroke="#78909c" stroke-width="5" stroke-linecap="round"
            fill="none" />
          <circle cx="270" cy="145" r="5" fill="#37474f" />

          <!-- Big Delivery Box on the back -->
          <rect x="145" y="145" width="55" height="55" rx="8" fill="url(#boxGrad)" />
          <!-- Ribbon/Stripes on Box -->
          <path d="M 172,145 L 172,200 M 145,172 L 200,172" stroke="#e65100" stroke-width="3" />

          <!-- Courier / Rider -->
          <g class="rider">
            <!-- Torso -->
            <path d="M 215,145 Q 225,100 235,115 L 250,150 L 225,160 Z" fill="#263238" />
            <!-- Head / Helmet -->
            <circle cx="225" cy="85" r="18" fill="var(--primary)" />
            <!-- Helmet Visor -->
            <path d="M 225,73 Q 240,75 238,90 Q 225,95 220,85 Z" fill="#37474f" />
            <!-- Arms holding handlebars -->
            <path d="M 225,120 L 268,143" stroke="#263238" stroke-width="6" stroke-linecap="round" fill="none" />
          </g>
        </g>

        <!-- Floating Particles (Speed effect) -->
        <g class="speed-lines">
          <line x1="80" y1="120" x2="130" y2="120" stroke="var(--primary)" stroke-width="3" stroke-linecap="round"
            opacity="0.6" />
          <line x1="60" y1="160" x2="100" y2="160" stroke="var(--primary)" stroke-width="2" stroke-linecap="round"
            opacity="0.4" />
          <line x1="90" y1="200" x2="140" y2="200" stroke="var(--primary)" stroke-width="3" stroke-linecap="round"
            opacity="0.5" />
          <line x1="380" y1="100" x2="420" y2="100" stroke="var(--primary)" stroke-width="2" stroke-linecap="round"
            opacity="0.4" />
          <line x1="360" y1="150" x2="410" y2="150" stroke="var(--primary)" stroke-width="3" stroke-linecap="round"
            opacity="0.6" />
        </g>
      </svg>
    </div>

    <!-- Success Content -->
    <div class="success-content">
      <h1 class="success-title">{{ 'ORDER_RECEIVED_SUCCESSFULLY' | translate }}</h1>
      <p class="success-description">{{ 'ORDER_SUCCESS_DESC' | translate }}</p>

      <!-- Countdown Circle Visualizer -->
      <div class="countdown-container">
        <div class="countdown-circle">
          <span class="countdown-number">{{ secondsRemaining }}</span>
          <svg class="countdown-svg" viewBox="0 0 100 100">
            <circle class="countdown-bg-ring" cx="50" cy="50" r="45"></circle>
            <circle class="countdown-bar" cx="50" cy="50" r="45"
              [style.strokeDashoffset]="(282.6 - (282.6 * secondsRemaining / 10))"></circle>
          </svg>
        </div>
        <p class="countdown-text">{{ 'REDIRECTING_TO_ORDERS' | translate: { seconds: secondsRemaining } }}</p>
      </div>

      <!-- Action Button -->
      <button class="btn btn-primary btn-lg btn-orders" (click)="goToOrders()">
        {{ 'GO_TO_ORDERS' | translate }}
        <i class="uil" [class.uil-arrow-right]="lang.current !== 'ar'"
          [class.uil-arrow-left]="lang.current === 'ar'"></i>
      </button>
    </div>
  </div>
</div>
