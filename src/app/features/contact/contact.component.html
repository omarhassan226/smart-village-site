<div class="contact-page">
  <!-- Hero Section -->
  <section class="contact-hero">
    <div class="container">
      <h1>{{ 'CONTACT_US' | translate }}</h1>
      <p>{{ 'CONTACT_HERO_DESC' | translate }}</p>
    </div>
  </section>

  <section class="contact-content">
    <div class="container">
      <div class="contact-grid">

        <!-- Phone & WhatsApp Card -->
        <div class="info-card">
          <div class="icon-box"><i class="uil uil-phone"></i></div>
          <div class="text-box">
            <h3>{{ 'PHONE_NUMBER' | translate }}</h3>
            <p dir="ltr" *ngIf="socialLinks.phone" class="contact-link-wrap">
              <a [href]="'tel:' + socialLinks.phone" class="contact-link tel-link">
                <i class="uil uil-outgoing-call"></i> {{ socialLinks.phone }}
              </a>
            </p>
            <p dir="ltr" *ngIf="socialLinks.whatsapp" class="contact-link-wrap">
              <a [href]="getWhatsAppLink(socialLinks.whatsapp)" target="_blank" rel="noopener"
                class="contact-link whatsapp-link">
                <i class="uil uil-whatsapp"></i> {{ socialLinks.whatsapp }}
              </a>
            </p>
          </div>
        </div>

        <!-- Email Card -->

          <div class="text-box">
            <h3>{{ 'EMAIL' | translate }}</h3>
            <p class="contact-link-wrap">
              <a href="mailto:info@smartvillageapp.com" class="contact-link email-link">
                <i class="uil uil-envelope-alt"></i> info&#64;smartvillageapp.com
              </a>
            </p>
          </div>
        </div> -->

        </div> -->

      </div>
    </div>
  </section>
</div>
