<section class="brands" *ngIf="loading || brands.length > 0">
  <div class="container">
    <div class="section-title">
      <h2>{{ 'BEST_SELLERS' | translate }}</h2>
    </div>

    <!-- Skeletons -->
    <div class="brands__grid" *ngIf="loading">
      <div class="skeleton brands__skeleton" *ngFor="let i of [1,2,3,4,5,6]"></div>
    </div>

    <!-- Brands -->
    <div class="brands__grid" *ngIf="!loading">
      <a class="brands__item" *ngFor="let brand of brands" [routerLink]="['/products']"
        [queryParams]="{ brand_id: brand.id }">
        <img [src]="brand.logo || brand.image" [alt]="getBrandName(brand)" class="brands__logo"
          onerror="this.src='assets/images/placeholder.png'" />
        <span class="brands__name">{{ getBrandName(brand) }}</span>
      </a>
    </div>
  </div>
</section>
