<section class="hero">
  <!-- Loading skeleton -->
  <div class="hero__skeleton" *ngIf="loading">
    <div class="skeleton hero__skeleton-img"></div>
  </div>

  <!-- Slider -->
  <div class="hero__slider" *ngIf="!loading && banners.length > 0">
    <div class="hero__track" [style.transform]="'translateX(' + (lang.isRtl ? activeIndex : -activeIndex) * 100 + '%)'">
      <div class="hero__slide" *ngFor="let banner of banners; let i = index">
        <div class="hero__slide-link">
          <img [src]="getBannerImage(banner)" [alt]="banner.banner_type || ''" class="hero__img"
            onerror="this.onerror=null;this.src='assets/images/placeholder.svg'" />
          <div class="hero__overlay">
            <div class="container hero__overlay-content">
              <span class="hero__badge" *ngIf="banner.banner_type">{{ banner.banner_type }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Arrows -->
    <button class="hero__arrow hero__arrow--prev" (click)="prev()" *ngIf="banners.length > 1" aria-label="Previous">
      <i class="uil uil-angle-left-b"></i>
    </button>
    <button class="hero__arrow hero__arrow--next" (click)="next()" *ngIf="banners.length > 1" aria-label="Next">
      <i class="uil uil-angle-right-b"></i>
    </button>

    <!-- Dots -->
    <div class="hero__dots" *ngIf="banners.length > 1">
      <button class="hero__dot" *ngFor="let b of banners; let i = index" [class.hero__dot--active]="i === activeIndex"
        (click)="goTo(i)">
        <span class="hero__dot-progress" *ngIf="i === activeIndex"></span>
      </button>
    </div>

    <!-- Slide Counter -->
    <div class="hero__counter" *ngIf="banners.length > 1">
      {{ activeIndex + 1 }} / {{ banners.length }}
    </div>
  </div>

  <!-- Fallback when no banners -->
  <div class="hero__fallback" *ngIf="!loading && banners.length === 0">
    <div class="container hero__fallback-inner">
      <i class="uil uil-store hero__fallback-icon"></i>
      <h1 class="hero__fallback-title">{{ lang.current === 'ar' ? 'القرية الذكية' : 'Smart Village' }}</h1>
      <p class="hero__fallback-subtitle">{{ lang.current === 'ar' ? 'وجهتك الأولى للتسوق الذكي' : 'Your Smart Shopping Destination' }}</p>
    </div>
  </div>
</section>
