<section class="product-section" [ngClass]="'product-section--' + sectionColor">
  <div class="container">
    <div class="section-header">
      <div class="section-header__left">
        <div class="section-header__icon" [ngClass]="'section-header__icon--' + sectionColor">
          <i class="uil" [ngClass]="sectionIcon"></i>
        </div>
        <h2 class="section-title">{{ titleKey | translate }}</h2>
      </div>
      <button class="section-header__view-all" (click)="viewAll()">
        {{ 'VIEW_ALL' | translate }}
        <i class="uil" [ngClass]="lang.isRtl ? 'uil-arrow-left' : 'uil-arrow-right'"></i>
      </button>
    </div>

    <!-- Skeletons -->
    <div class="product-grid" *ngIf="loading">
      <div class="skeleton product-skeleton" *ngFor="let i of [1,2,3,4,5,6,7,8]"></div>
    </div>

    <!-- Products -->
    <div class="product-grid" *ngIf="!loading && products.length > 0">
      <app-product-card *ngFor="let product of products" [product]="product"></app-product-card>
    </div>

    <app-empty-state *ngIf="!loading && products.length === 0" icon="uil uil-box"
      [title]="'NO_PRODUCTS' | translate"></app-empty-state>
  </div>
</section>
