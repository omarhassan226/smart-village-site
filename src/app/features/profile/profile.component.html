<app-breadcrumb [items]="[
  { label: ('HOME' | translate), route: '/' },
  { label: ('TITLE' | translate) }
]"></app-breadcrumb>

<div class="container profile-page">
  <div class="profile-layout">
    <!-- Sidebar -->
    <div class="profile-sidebar">
      <div class="profile-avatar">
        <div class="profile-avatar__circle">
          <img
            *ngIf="auth.user?.image"
            [src]="auth.user?.image"
            [alt]="auth.user?.first_name"
            class="profile-avatar__img"
          />
          <span *ngIf="!auth.user?.image" class="profile-avatar__initials">
            {{ auth.user?.first_name?.charAt(0) }}{{ auth.user?.last_name?.charAt(0) }}
          </span>
        </div>
        <h3 class="profile-avatar__name">{{ auth.user?.first_name }} {{ auth.user?.last_name }}</h3>
        <p class="profile-avatar__phone">{{ auth.user?.phone }}</p>
      </div>

      <nav class="profile-nav">
        <a routerLink="info" routerLinkActive="active" class="profile-nav__item">
          <i class="uil uil-user"></i>
          {{ 'EDIT_DATA' | translate }}
        </a>
        <a routerLink="orders" routerLinkActive="active" class="profile-nav__item">
          <i class="uil uil-box"></i>
          {{ 'MY_ORDERS' | translate }}
        </a>
        <a routerLink="/wishlist" class="profile-nav__item">
          <i class="uil uil-heart"></i>
          {{ 'WISHLIST' | translate }}
        </a>
        <button class="profile-nav__item profile-nav__item--danger" (click)="logout()">
          <i class="uil uil-signout"></i>
          {{ 'LOGOUT' | translate }}
        </button>
      </nav>
    </div>

    <!-- Content -->
    <div class="profile-content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
