<app-breadcrumb [items]="[
  { label: ('HOME' | translate), route: '/' },
  { label: ('WISHLIST' | translate) }
]"></app-breadcrumb>

<div class="container wishlist-page">
  <div class="wishlist-page__header">
    <h1 class="wishlist-page__title">
      <i class="uil uil-heart"></i>
      {{ 'WISHLIST' | translate }}
      <span class="wishlist-page__count" *ngIf="products.length > 0">{{ products.length }}</span>
    </h1>
  </div>

  <app-loading-spinner *ngIf="loading" [fullPage]="true"></app-loading-spinner>

  <app-empty-state
    *ngIf="!loading && products.length === 0"
    icon="uil uil-heart"
    [title]="'WISHLIST_EMPTY_TITLE' | translate"
    [description]="'WISHLIST_EMPTY_DESC' | translate"
  >
    <a routerLink="/products" class="btn btn-primary">
      <i class="uil uil-shopping-bag"></i>
      {{ 'CONTINUE_SHOPPING' | translate }}
    </a>
  </app-empty-state>

  <div class="wishlist-grid" *ngIf="!loading && products.length > 0">
    <app-product-card
      *ngFor="let product of products"
      [product]="product"
      (wishlistToggled)="onWishlistToggled($event)"
    ></app-product-card>
  </div>
</div>
